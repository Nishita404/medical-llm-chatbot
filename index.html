<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical LLM Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ---- Sidebar ---- */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #171717;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a2a;
      height: 100vh;
    }

    #sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    #sidebar-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    #new-chat-btn {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #new-chat-btn:hover { background: #16a34a; }

    #model-toggle {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    #model-toggle label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      display: block;
      margin-bottom: 8px;
    }

    #model-select {
      width: 100%;
      padding: 8px 10px;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
    }

    #history-label {
      padding: 12px 16px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
      group: true;
    }

    .session-item:hover { background: #222; }
    .session-item.active { background: #1e3a2f; }

    .session-title {
      font-size: 13px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .session-item.active .session-title { color: #22c55e; }

    .delete-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .session-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ef4444; background: #2a1a1a; }

    #sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
      font-size: 11px;
      color: #444;
    }

    /* ---- Main area ---- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chat-header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    #chat-header span {
      font-size: 12px;
      color: #555;
    }

    /* ---- Messages ---- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #444;
    }

    #empty-state h2 { font-size: 24px; color: #666; }
    #empty-state p { font-size: 14px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-btn {
      padding: 8px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion-btn:hover {
      background: #222;
      border-color: #22c55e;
      color: #22c55e;
    }

    .message { display: flex; gap: 12px; max-width: 800px; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user .avatar { background: #22c55e; color: #000; }
    .assistant .avatar { background: #1e3a2f; color: #22c55e; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 600px;
    }

    .user .bubble {
      background: #1a2e1a;
      border: 1px solid #22c55e33;
      color: #e0e0e0;
    }

    .assistant .bubble {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
    }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ---- Input area ---- */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid #1a1a1a;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    #input-row:focus-within { border-color: #22c55e55; }

    #question-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }

    #question-input::placeholder { color: #444; }

    #send-btn {
      background: #22c55e;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: #16a34a; }
    #send-btn:disabled { background: #333; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; fill: #000; }

    #disclaimer {
      text-align: center;
      font-size: 11px;
      color: #333;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>🩺 MedChat</h2>
      <button id="new-chat-btn" onclick="newChat()">+ New chat</button>
    </div>

    <div id="model-toggle">
      <label>Active model</label>
      <select id="model-select">
        <option value="fine-tuned">Fine-tuned model</option>
        <option value="base">Base model</option>
      </select>
    </div>

    <div id="history-label">Chat history</div>
    <div id="session-list"></div>

    <div id="sidebar-footer">Fine-tuned on MedQuAD · RTX 4060</div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="chat-header">
      <h1>Medical LLM Chatbot</h1>
      <span id="model-label">Fine-tuned model</span>
    </div>

    <div id="messages">
      <div id="empty-state">
        <h2>🩺 How can I help?</h2>
        <p>Ask any medical question below</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="suggest('What are the symptoms of diabetes?')">Symptoms of diabetes</button>
          <button class="suggestion-btn" onclick="suggest('How is hypertension treated?')">Hypertension treatment</button>
          <button class="suggestion-btn" onclick="suggest('What causes anemia?')">Causes of anemia</button>
          <button class="suggestion-btn" onclick="suggest('How is pneumonia diagnosed?')">Pneumonia diagnosis</button>
          <button class="suggestion-btn" onclick="suggest('What are the side effects of ibuprofen?')">Ibuprofen side effects</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea id="question-input" rows="1" placeholder="Ask a medical question..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
      <div id="disclaimer">Not intended for real medical advice.</div>
    </div>
  </div>

<script>
  let currentSessionId = null;
  let isLoading = false;

  // Auto resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // Handle Enter key
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Load session list in sidebar
  async function loadSessions() {
    const res = await fetch('/sessions');
    const sessions = await res.json();
    const list = document.getElementById('session-list');
    list.innerHTML = '';

    if (sessions.length === 0) {
      list.innerHTML = '<div style="padding: 12px 10px; font-size: 12px; color: #444;">No conversations yet</div>';
      return;
    }

    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      item.innerHTML = `
        <span class="session-title" title="${s.title}">${s.title}</span>
        <button class="delete-btn" onclick="deleteSession(event, '${s.id}')" title="Delete">✕</button>
      `;
      item.onclick = (e) => {
        if (!e.target.classList.contains('delete-btn')) loadSession(s.id);
      };
      list.appendChild(item);
    });
  }

  // Load a specific session
  async function loadSession(sessionId) {
    const res = await fetch(`/session/${sessionId}`);
    const data = await res.json();
    currentSessionId = sessionId;

    const messages = document.getElementById('messages');
    messages.innerHTML = '';

    data.messages.forEach(msg => {
      appendMessage(msg.role, msg.content);
    });

    loadSessions();
    scrollToBottom();
  }

  // Delete a session
  async function deleteSession(e, sessionId) {
    e.stopPropagation();
    await fetch(`/session/${sessionId}`, { method: 'DELETE' });
    if (currentSessionId === sessionId) newChat();
    else loadSessions();
  }

  // Start a new chat
  function newChat() {
    currentSessionId = null;
    const messages = document.getElementById('messages');
    messages.innerHTML = `
      <div id="empty-state">
        <h2>🩺 How can I help?</h2>
        <p>Ask any medical question below</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="suggest('What are the symptoms of diabetes?')">Symptoms of diabetes</button>
          <button class="suggestion-btn" onclick="suggest('How is hypertension treated?')">Hypertension treatment</button>
          <button class="suggestion-btn" onclick="suggest('What causes anemia?')">Causes of anemia</button>
          <button class="suggestion-btn" onclick="suggest('How is pneumonia diagnosed?')">Pneumonia diagnosis</button>
          <button class="suggestion-btn" onclick="suggest('What are the side effects of ibuprofen?')">Ibuprofen side effects</button>
        </div>
      </div>
    `;
    loadSessions();
    document.getElementById('question-input').focus();
  }

  // Fill input with suggestion
  function suggest(text) {
    document.getElementById('question-input').value = text;
    sendMessage();
  }

  // Append a message bubble
  function appendMessage(role, content) {
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '🩺'}</div>
      <div class="bubble">${content}</div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  // Show typing indicator
  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">🩺</div>
      <div class="bubble typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    messages.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }

  // Send message
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question) return;

    const modelChoice = document.getElementById('model-select').value;
    document.getElementById('model-label').textContent =
      modelChoice === 'fine-tuned' ? 'Fine-tuned model' : 'Base model';

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', question);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          session_id: currentSessionId,
          model_choice: modelChoice
        })
      });

      const data = await res.json();
      currentSessionId = data.session_id;
      removeTyping();
      appendMessage('assistant', data.response);
      loadSessions();

    } catch (err) {
      removeTyping();
      appendMessage('assistant', 'Something went wrong. Please try again.');
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  // Init
  loadSessions();
</script>
</body>
</html>
